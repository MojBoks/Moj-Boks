<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db = getFirestore(app);

let data = [];

async function load(){

const snap = await getDocs(collection(db,"listings"));

data = snap.docs.map(d=>({id:d.id,...d.data()}));

render();

}

window.setStatus = async function(id,status){

await updateDoc(doc(db,"listings",id),{status});

load();

}

function render(){

const el=document.getElementById("admin");
el.innerHTML="";

data.forEach(x=>{

el.innerHTML += `
<div style="background:#fff;margin:10px;padding:10px">

<h3>${x.companyName}</h3>
<p>${x.status}</p>

<button onclick="setStatus('${x.id}','ACTIVE')">ACTIVE</button>
<button onclick="setStatus('${x.id}','REJECTED')">REJECT</button>

</div>
`;

});

}

load();

</script>
</head>

<body>
<h2>ADMIN PANEL</h2>
<div id="admin"></div>
</body>
</html>
