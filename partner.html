<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Partner Dashboard</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user = null;

onAuthStateChanged(auth,(u)=>{
user = u;
if(u) loadMyListings();
});

window.login = async function(){

const email = document.getElementById("email").value;
const pass = document.getElementById("pass").value;

await signInWithEmailAndPassword(auth,email,pass);

alert("Ulogovan");
}

window.addListing = async function(){

await addDoc(collection(db,"listings"),{

companyName:document.getElementById("name").value,
municipality:document.getElementById("municipality").value,
storageType:document.getElementById("storage").value,
goodsType:document.getElementById("goods").value,
phone:document.getElementById("phone").value,
email:document.getElementById("emailC").value,
price:document.getElementById("price").value,
status:"PENDING",
ownerId:user.uid,
views:0,
contactClicks:0

});

alert("Poslato na odobrenje");
}

async function loadMyListings(){

const q = query(collection(db,"listings"),where("ownerId","==",user.uid));

const snap = await getDocs(q);

let html="";

snap.forEach(d=>{

html += `<p>${d.data().companyName} - ${d.data().status}</p>`;

});

document.getElementById("my").innerHTML = html;

}

</script>
</head>

<body>

<h2>Partner Login</h2>

<input id="email" placeholder="email">
<input id="pass" placeholder="password">
<button onclick="login()">Login</button>

<hr>

<h2>Dodaj oglas</h2>

<input id="name" placeholder="Firma">
<input id="municipality" placeholder="Opština">
<input id="storage" placeholder="Tip skladišta">
<input id="goods" placeholder="Vrsta robe">
<input id="phone" placeholder="Telefon">
<input id="emailC" placeholder="Email">
<input id="price" placeholder="Cena">

<button onclick="addListing()">Dodaj</button>

<h3>Moji oglasi</h3>
<div id="my"></div>

</body>
</html>
