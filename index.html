<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moj Boks</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db = getFirestore(app);

let data = [];

async function load(){

const snap = await getDocs(collection(db,"listings"));

data = snap.docs.map(d => ({id:d.id,...d.data()}));

render(data.filter(x=>x.status==="ACTIVE"));

}

window.showContact = async function(id,phone){

document.getElementById("c_"+id).innerHTML = phone;

await updateDoc(doc(db,"listings",id),{
contactClicks: increment(1)
});

}

function render(list){

const el = document.getElementById("list");
el.innerHTML="";

list.forEach(x=>{

el.innerHTML += `
<div style="padding:10px;background:#fff;margin:10px">

<h3>${x.companyName}</h3>
<p>${x.municipality}</p>
<p>${x.price}</p>

<button onclick="showContact('${x.id}','${x.phone}')">
Prikaži kontakt
</button>

<div id="c_${x.id}"></div>

</div>
`;

});

}

load();

</script>
</head>

<body>
<div id="list"></div>
</body>
</html>
