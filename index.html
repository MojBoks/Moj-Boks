<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Moj Boks</title>

<style>
body{margin:0;font-family:Arial;background:#f3f6fb}

/* HEADER */
.header{
background:#1e5eff;
color:white;
text-align:center;
padding:40px 20px;
}

.header h1{margin:0;font-size:34px}
.header p{margin-top:10px;font-size:16px}

/* FILTERI */
.filters{
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

select,input{
padding:10px;
}

/* CARD */
.card{
background:white;
margin:10px auto;
padding:15px;
width:90%;
max-width:600px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* FOOTER */
footer{
text-align:center;
font-size:12px;
padding:20px;
color:gray;
}
button{padding:8px;margin-top:8px}
</style>
</head>

<body>

<div class="header">
<h1>Moj Boks</h1>
<p>Platforma za pronalaženje skladišnog prostora u Srbiji</p>
</div>

<div class="filters">
<input id="search" placeholder="Pretraga..." oninput="filter()">

<select id="municipality" onchange="filter()"></select>
<select id="storageType" onchange="filter()"></select>
<select id="goodsType" onchange="filter()"></select>
</div>

<div id="list"></div>

<footer>
Kontakt za buduće partnere Moj Boks sistema: https://forms.gle/K6L5XxvrZwkC6H8p7
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyCcB5d4GhAM2llii0YEF-GYah8x1I7Fklc",
authDomain:"moj-boks.firebaseapp.com",
projectId:"moj-boks",
storageBucket:"moj-boks.firebasestorage.appYOUR_BUCKET"
});

const db = getFirestore(app);

let all=[];

async function load(){

const snap = await getDocs(collection(db,"listings"));

all = snap.docs.map(d=>({id:d.id,...d.data()}))
.filter(x=>x.status==="ACTIVE");

fillFilters();
render(all);

}

function fillFilters(){

const m=[...new Set(all.map(x=>x.municipality))];
const s=[...new Set(all.map(x=>x.storageType))];
const g=[...new Set(all.map(x=>x.goodsType))];

document.getElementById("municipality").innerHTML =
"<option value=''>Opština</option>" + m.map(x=>`<option>${x}</option>`);

document.getElementById("storageType").innerHTML =
"<option value=''>Tip</option>" + s.map(x=>`<option>${x}</option>`);

document.getElementById("goodsType").innerHTML =
"<option value=''>Roba</option>" + g.map(x=>`<option>${x}</option>`);

}

window.filter=function(){

let q=document.getElementById("search").value.toLowerCase();
let m=document.getElementById("municipality").value;
let s=document.getElementById("storageType").value;
let g=document.getElementById("goodsType").value;

render(all.filter(x=>
(!m || x.municipality===m) &&
(!s || x.storageType===s) &&
(!g || x.goodsType===g) &&
(x.companyName||"").toLowerCase().includes(q)
));

}

window.details=async function(x){

await updateDoc(doc(db,"listings",x.id),{
views:increment(1)
});

alert(
x.companyName + "\n" +
x.municipality + "\n" +
x.storageType + "\n" +
x.goodsType + "\n" +
x.price + "\n" +
x.address
);

}

window.showContact=async function(x){

await updateDoc(doc(db,"listings",x.id),{
contactClicks:increment(1)
});

alert("Telefon: " + x.phone + "\nEmail: " + x.email);
}

function render(data){

list.innerHTML="";

data.forEach(x=>{

list.innerHTML+=`
<div class="card">

<h3>${x.companyName}</h3>
<p>${x.municipality} | ${x.storageType}</p>
<p>${x.price}</p>

<button onclick='details(${JSON.stringify(x)})'>Detalji</button>
<button onclick='showContact(${JSON.stringify(x)})'>Kontakt</button>

</div>
`;
});

}

load();

</script>

</body>
</html>
