<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moj Boks</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0}
.card{background:white;margin:10px;padding:10px;border-radius:10px}
input{padding:10px;width:300px;margin:10px}
</style>
</head>

<body>

<h2>Moj Boks</h2>

<input id="search" placeholder="Pretraga..." oninput="filter()">

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCcB5d4GhAM2llii0YEF-GYah8x1I7Fklc",
authDomain:"moj-boks.firebaseapp.com",
projectId:"moj-boks"
});

const db = getFirestore(app);

let all=[];

async function load(){

const snap = await getDocs(collection(db,"listings"));

all = snap.docs.map(d=>d.data());

render(all);

}

window.filter = function(){

const q = document.getElementById("search").value.toLowerCase();

render(all.filter(x =>
(x.companyName||"").toLowerCase().includes(q) ||
(x.municipality||"").toLowerCase().includes(q) ||
(x.goodsType||"").toLowerCase().includes(q)
));

}

function render(data){

list.innerHTML="";

data.forEach(x=>{

list.innerHTML += `
<div class="card">

<h3>${x.companyName}</h3>
<p>${x.municipality}</p>
<p>${x.storageType}</p>
<p>${x.price}</p>

</div>
`;

});

}

load();

</script>

</body>
</html>
